<!DOCTYPE html>
<html lang="pt-br" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Pedidos - Restaurante SaaS</title>
  
  <!-- Estilos e Ícones -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-utensils"></i>
        <span>FoodSaaS</span>
      </div>
      
      <nav>
        <a href="#" class="nav-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Clientes</a>
        <a href="#" class="nav-item active"><i class="fa-solid fa-list-check"></i> Pedidos</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Configurações</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" placeholder="Pesquisar pedidos ou pratos...">
        </div>
        
        <div class="topbar-actions">
          <button class="btn-icon" id="theme-toggle" title="Alternar Tema"><i class="fa-solid fa-moon"></i></button>
          <button class="btn-icon" title="Notificações"><i class="fa-regular fa-bell"></i></button>
          <button class="btn-icon" title="Perfil"><i class="fa-regular fa-circle-user"></i></button>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page">
        <div class="page-header">
          <h1 class="page-title">Gerenciamento de Pedidos</h1>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" onclick="carregarPedidos()"><i class="fa-solid fa-rotate-right"></i> Atualizar</button>
            <button class="btn btn-outline" title="Exportar para Excel"><i class="fa-solid fa-file-export"></i> Exportar</button>
          </div>
        </div>

        <!-- Conexões com Microsserviços -->
        <div class="config-ip" style="display: flex; gap: 20px; align-items: flex-start;">
          <div style="flex: 1;">
            <i class="fa-solid fa-users" style="color: var(--primary);"></i>
            <label for="url-clientes" style="display: inline-block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-left: 5px;">Serviço de Clientes</label>
            <input type="text" id="url-clientes" class="form-control" style="width: 100%; margin-top: 4px;" placeholder="http://IP_DO_GRUPO:3001/clientes" onchange="carregarClientes()">
          </div>
          <div style="flex: 1;">
            <i class="fa-solid fa-network-wired" style="color: var(--primary);"></i>
            <label for="url-pagamento" style="display: inline-block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-left: 5px;">Serviço de Pagamentos</label>
            <input type="text" id="url-pagamento" class="form-control" style="width: 100%; margin-top: 4px;" placeholder="http://IP_DO_GRUPO:3003/pagamento">
          </div>
        </div>

        <!-- Cadastro / Edição Card -->
        <div class="card">
          <form id="form-pedido">
            <div class="form-grid">
              
              <div class="form-group">
                <label for="id_readonly">ID (Automático)</label>
                <input type="text" id="id_readonly" class="form-control" disabled placeholder="Gerado ao salvar">
              </div>

              <div class="form-group">
                <label for="cliente">Cliente</label>
                <select id="cliente" class="form-control" required>
                  <option value="">-- Preencha a URL de Clientes primeiro --</option>
                </select>
              </div>

              <div class="form-group">
                <label for="data">Data do Pedido</label>
                <input type="date" id="data" class="form-control">
              </div>

              <div class="form-group">
                <label for="prato">Prato</label>
                <input type="text" id="prato" class="form-control" required placeholder="Ex: Filé à Parmegiana">
              </div>

              <div class="form-group">
                <label for="valor">Valor (R$)</label>
                <input type="number" step="0.01" id="valor" class="form-control" required placeholder="0.00">
              </div>

            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px;">
              <button type="button" class="btn btn-outline" id="btn-limpar"><i class="fa-solid fa-eraser"></i> Limpar</button>
              <button type="submit" class="btn btn-primary" id="btn-salvar"><i class="fa-solid fa-plus"></i> Salvar Pedido</button>
            </div>
          </form>
        </div>

        <!-- Tabela -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID <i class="fa-solid fa-sort" style="margin-left: 5px; opacity: 0.5;"></i></th>
                <th>Cliente</th>
                <th>Data</th>
                <th>Prato</th>
                <th>Valor</th>
                <th style="width: 150px;">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-pedidos">
              <!-- Renderizado via JS -->
            </tbody>
          </table>
        </div>

      </div>
    </main>
  </div>

  <!-- Container de Toasts -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
