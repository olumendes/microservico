<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API de Pedidos</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  h1 {
    color: #d35400;
    text-align: center;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 25px;
    border-bottom: 2px solid #eee;
    padding-bottom: 20px;
  }
  label {
    font-size: 13px;
    font-weight: bold;
    color: #555;
  }
  input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
  }
  button {
    padding: 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  button[type="submit"] {
    background: #d35400;
    color: white;
    font-weight: bold;
  }
  .pedido {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pedido-info b {
    color: #d35400;
  }
  .btn-excluir {
    background: #e74c3c;
    color: white;
    font-size: 12px;
    padding: 6px 10px;
  }
  #mensagem {
    text-align: center;
    font-size: 13px;
    margin-top: 5px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>API de Pedidos</h1>

  <form id="form-pedido">
    <label>ID do Cliente</label>
    <input type="number" id="cliente" required>

    <label>Prato</label>
    <input type="text" id="prato" required>

    <label>Valor (R$)</label>
    <input type="number" id="valor" step="0.01" required>

    <button type="submit">Adicionar Pedido</button>
    <div id="mensagem"></div>
  </form>

  <div id="lista-pedidos">Carregando pedidos...</div>
</div>

<script>
  const API_URL = '/pedidos'; // como o front roda no mesmo servidor, fica relativo

  async function carregarPedidos() {
    const resposta = await fetch(API_URL);
    const pedidos = await resposta.json();

    const lista = document.getElementById('lista-pedidos');

    if (pedidos.length === 0) {
      lista.innerHTML = '<p>Nenhum pedido cadastrado ainda.</p>';
      return;
    }

    lista.innerHTML = pedidos.map(p => `
      <div class="pedido">
        <div class="pedido-info">
          <b>#${p.id}</b> - ${p.prato} <br>
          Cliente: ${p.cliente} | R$ ${Number(p.valor).toFixed(2)} | ${p.data || ''}
        </div>
        <button class="btn-excluir" onclick="excluirPedido(${p.id})">Excluir</button>
      </div>
    `).join('');
  }

  async function excluirPedido(id) {
    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
    carregarPedidos();
  }

  document.getElementById('form-pedido').addEventListener('submit', async (e) => {
    e.preventDefault();

    const cliente = document.getElementById('cliente').value;
    const prato = document.getElementById('prato').value;
    const valor = document.getElementById('valor').value;
    const mensagem = document.getElementById('mensagem');

    const resposta = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cliente: Number(cliente),
        prato,
        valor: Number(valor),
        data: new Date().toISOString().slice(0, 10)
      })
    });

    if (resposta.ok) {
      mensagem.style.color = 'green';
      mensagem.textContent = 'Pedido adicionado!';
      document.getElementById('form-pedido').reset();
      carregarPedidos();
    } else {
      mensagem.style.color = 'red';
      mensagem.textContent = 'Erro ao adicionar pedido.';
    }
  });

  carregarPedidos();
</script>
</body>
</html>
